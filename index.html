<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont;
}

/* 🔝 TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
}

/* 💎 WALLET CARD */
.wallet {
  margin: 15px;
  padding: 18px;
  border-radius: 25px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.08);
}

.wallet h1 {
  margin: 10px 0;
  font-size: 32px;
}

/* 🧊 GLASS BUTTON */
.glass-btn {
  padding: 12px;
  border-radius: 20px;
  text-align: center;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.1);

  transition: 0.2s;
}

.glass-btn:active {
  transform: scale(0.95);
  background: rgba(255,255,255,0.15);
}

/* кнопки ряд */
.actions {
  display: flex;
  gap: 10px;
}

/* контент */
.content {
  padding: 15px;
}

/* NFT карточки */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 10px;
  margin-bottom: 10px;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

/* 🔻 NAV */
.nav {
  position: fixed;
  bottom: 20px;
  left: 16px;
  right: 16px;

  display: flex;
  justify-content: space-around;

  padding: 12px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(30px);

  border-radius: 30px;
}

.btn {
  text-align: center;
  color: #888;
}

.btn.active {
  color: white;
}

/* 💰 MODAL */
.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  background: rgba(20,20,20,0.95);
  backdrop-filter: blur(30px);

  padding: 20px;
  display: none;

  border-radius: 25px 25px 0 0;
}
</style>
</head>

<body>

<!-- 🔝 -->
<div class="topbar">
  <img id="avatar" class="avatar">
  <div id="username">User</div>
</div>

<!-- 💎 WALLET -->
<div class="wallet">
  <div>Wallet</div>
  <h1 id="balance">0 TON</h1>

  <div class="actions">
    <div class="glass-btn" onclick="openDeposit()">Deposit</div>
    <div class="glass-btn">Withdraw</div>
  </div>
</div>

<!-- 📦 CONTENT -->
<div id="content" class="content"></div>

<!-- 🔻 NAV -->
<div class="nav">
  <div class="btn active" onclick="openTab('market', this)">🏪</div>
  <div class="btn" onclick="openTab('profile', this)">👤</div>
</div>

<!-- 💰 MODAL -->
<div id="modal" class="modal">
  <h3>Пополнение</h3>

  <div class="glass-btn" onclick="payTON()">
    💎 TON
  </div>

  <div class="glass-btn" style="margin-top:10px;" onclick="sendNFT()">
    🎁 NFT
  </div>

  <div style="margin-top:10px;text-align:center;color:#888;" onclick="closeModal()">
    Закрыть
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = null;

// 👤 USER
const user = tg.initDataUnsafe.user;

if (user) {
  userId = user.id;
  document.getElementById("username").innerText = user.first_name;
  document.getElementById("avatar").src =
    user.photo_url || "https://i.pravatar.cc/100";
}

// 💰 API
const API = "https://ТВОЙ-RAILWAY-URL";

// баланс
async function loadBalance() {
  if (!userId) return;

  const res = await fetch(API + "/profile?user_id=" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText = data.balance + " TON";
}

setInterval(loadBalance, 5000);
loadBalance();

// вкладки
function openTab(tab, el) {
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  const content = document.getElementById("content");

  if (tab === "market") {
    content.innerHTML = `
      <div class="card">
        <img src="https://picsum.photos/200?1">
        <div>Rare NFT</div>
        <div>0.2 TON</div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200?2">
        <div>Epic NFT</div>
        <div>0.5 TON</div>
      </div>
    `;
  }

  if (tab === "profile") {
    content.innerHTML = `
      <div class="wallet">
        <h2>Balance</h2>
        <h1>${document.getElementById("balance").innerText}</h1>

        <div class="actions">
          <div class="glass-btn" onclick="openDeposit()">Deposit</div>
          <div class="glass-btn">Withdraw</div>
        </div>
      </div>
    `;
  }
}

// модалка
function openDeposit() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// TON
function payTON() {
  const wallet = "ТВОЙ_TON_КОШЕЛЕК";
  const amount = 0.1;

  window.open(
    `https://app.tonkeeper.com/transfer/${wallet}?amount=${amount * 1e9}&text=user_${userId}`
  );

  closeModal();
}

// NFT
function sendNFT() {
  tg.sendData("deposit_gift");
  closeModal();
}

// старт
openTab("market", document.querySelector(".btn"));
</script>

</body>
</html>
