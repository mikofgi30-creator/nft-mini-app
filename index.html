<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Arena</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #1e1b4b, #020617);
  color: white;
}

.card {
  margin: 20px;
  background: linear-gradient(180deg, #9333ea, #6b21a8);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
}

.card img {
  width: 120px;
}

.title {
  font-size: 24px;
  margin-top: 10px;
}

.subtitle {
  opacity: 0.8;
  font-size: 14px;
}

.results {
  padding: 20px;
}

.player {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: #0f172a;
}

.play-btn {
  width: 100%;
  padding: 15px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(90deg, #a855f7, #9333ea);
  color: white;
  font-size: 16px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="card">
  <img src="https://picsum.photos/200" />
  <div class="title">Арена Турнир</div>
  <div class="subtitle">
    Топ-1000 игроков получают NFT и TON
  </div>
</div>

<div class="results">
  <h2>Результаты</h2>

  <div class="player">
    <span>🥇 user1</span>
    <span>86 TON</span>
  </div>

  <div class="player">
    <span>🥈 user2</span>
    <span>54 TON</span>
  </div>

  <div class="player">
    <span>🥉 user3</span>
    <span>21 TON</span>
  </div>
</div>

<div class="bottom">
  <button class="play-btn" onclick="play()">Играть в Арену</button>
</div>

<script>
function play() {
  alert("🚀 Запуск игры...");
}
</script>

</body>
</html>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram.WebApp;

// раскрывает приложение на весь экран
tg.expand();

// получаем пользователя
const user = tg.initDataUnsafe.user;

if (user) {
  document.body.innerHTML += `
    <p>👤 ${user.first_name}</p>
  `;
}
</script>
