<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>NFT Bot</title>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🚀 Мой NFT сайт</h1>

  <div id="ton-connect"></div>

  <p id="wallet">Кошелек не подключен</p>

  <script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://raw.githubusercontent.com/ton-community/tutorials/main/03-client/manifest.json'
    });

    tonConnectUI.onStatusChange(wallet => {
      if (wallet) {
        document.getElementById("wallet").innerText =
          "✅ Кошелек: " + wallet.account.address;
      }
    });
  </script>

</body>
</html>
