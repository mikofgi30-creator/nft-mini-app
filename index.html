<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = null;

// 👤 Telegram user
const user = tg.initDataUnsafe.user;

if (user) {
  userId = user.id;

  document.getElementById("username").innerText = user.first_name;

  if (user.photo_url) {
    document.getElementById("avatar").src = user.photo_url;
  } else {
    document.getElementById("avatar").src = "https://i.pravatar.cc/100";
  }
}

// 🔥 ТВОЙ API (вставь Railway URL)
const API_URL = "https://ТВОЙ-RAILWAY-URL.up.railway.app";

// 🔄 загрузка профиля (баланс + NFT)
async function loadProfile() {
  if (!userId) return;

  try {
    const res = await fetch(API_URL + "/profile?user_id=" + userId);
    const data = await res.json();

    // баланс
    document.querySelector(".balance").innerHTML = "💎 " + data.balance;

    // если вкладка gifts — показываем NFT
    if (currentTab === "gifts") {
      if (data.nfts.length === 0) {
        document.getElementById("content").innerHTML = "😢 NFT нет";
      } else {
        document.getElementById("content").innerHTML =
          "🎁 NFT:<br><br>" + data.nfts.join("<br>");
      }
    }

  } catch (e) {
    console.log("Ошибка загрузки:", e);
  }
}

// 🔁 авто обновление
setInterval(loadProfile, 5000);
loadProfile();

// 🎁 ОПЛАТА TON (РЕАЛЬНАЯ)
function sendGift() {
  const wallet = "ТВОЙ_TON_АДРЕС"; // вставь свой
  const amount = 0.1;

  const url = `https://app.tonkeeper.com/transfer/${wallet}?amount=${amount * 1e9}&text=user_${userId}`;

  window.open(url, "_blank");
}

// 📂 вкладки
let currentTab = "market";

function openTab(tab, el) {
  currentTab = tab;

  document.querySelectorAll(".btn").forEach(btn => {
    btn.classList.remove("active");
  });

  el.classList.add("active");

  const content = document.getElementById("content");

  if (tab === "market") {
    content.innerHTML = "🛒 Здесь будет маркет";
  }

  if (tab === "games") {
    content.innerHTML = "🎮 Здесь будут игры";
  }

  if (tab === "gifts") {
    loadProfile(); // сразу загрузка NFT
  }
}

// ▶ кнопка
function playArena() {
  alert("🚀 Игра скоро будет!");
}
</script>
