<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #000, #111);
  color: white;
  font-family: Arial;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 16px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.gift-btn {
  padding: 8px 14px;
  border-radius: 20px;
  background: linear-gradient(90deg, #a855f7, #6366f1);
  font-size: 14px;
  cursor: pointer;
}

.balance {
  padding: 8px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

.header {
  padding: 0 20px;
  font-size: 22px;
  font-weight: bold;
}

.content {
  padding: 20px;
  font-size: 16px;
}

.play-btn {
  margin: 20px;
  padding: 16px;
  border-radius: 20px;
  text-align: center;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  font-weight: bold;
  cursor: pointer;
}

.nav {
  position: fixed;
  bottom: 20px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 30px;
}

.btn {
  color: #888;
  text-align: center;
  font-size: 12px;
  cursor: pointer;
}

.btn span {
  font-size: 22px;
  display: block;
}

.btn.active {
  color: white;
}

/* МОДАЛКА */
.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="user-info">
    <img id="avatar" class="avatar">
    <span id="username">User</span>
  </div>

  <div class="top-actions">
    <div class="gift-btn" onclick="openDeposit()">🎁 Внести</div>
    <div class="balance" id="balance">💎 0</div>
  </div>
</div>

<div class="header">Arena Tournament</div>

<div class="play-btn" onclick="playArena()">▶ Play Arena</div>

<div id="content" class="content">🛒 Здесь будет маркет</div>

<div class="nav">
  <div class="btn active" onclick="openTab('market', this)">
    <span>🏪</span>Market
  </div>
  <div class="btn" onclick="openTab('games', this)">
    <span>🎮</span>Games
  </div>
  <div class="btn" onclick="openTab('gifts', this)">
    <span>🎁</span>Gifts
  </div>
</div>

<!-- 💰 МОДАЛКА -->
<div id="modal" class="modal">
  <div style="text-align:center; margin-bottom:15px;">Пополнение</div>

  <div onclick="payTON()" style="padding:12px;background:#0072ff;border-radius:10px;margin-bottom:10px;text-align:center;">
    💎 Пополнить TON
  </div>

  <div onclick="sendNFT()" style="padding:12px;background:#a855f7;border-radius:10px;text-align:center;">
    🎁 NFT подарок
  </div>

  <div onclick="closeModal()" style="margin-top:10px;text-align:center;color:#888;">
    Закрыть
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = null;

// пользователь
const user = tg.initDataUnsafe.user;

if (user) {
  userId = user.id;
  document.getElementById("username").innerText = user.first_name;

  document.getElementById("avatar").src =
    user.photo_url || "https://i.pravatar.cc/100";
}

// API
const API = "https://ТВОЙ-RAILWAY-URL.up.railway.app";

// загрузка баланса
async function loadBalance() {
  if (!userId) return;

  const res = await fetch(API + "/profile?user_id=" + userId);
  const data = await res.json();

  document.getElementById("balance").innerHTML = "💎 " + data.balance;
}

setInterval(loadBalance, 5000);
loadBalance();

// открыть модалку
function openDeposit() {
  document.getElementById("modal").style.display = "block";
}

// закрыть
function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// TON оплата
function payTON() {
  const wallet = "ТВОЙ_TON_АДРЕС";
  const amount = 0.1;

  const url = `https://app.tonkeeper.com/transfer/${wallet}?amount=${amount * 1e9}&text=user_${userId}`;

  window.open(url, "_blank");
  closeModal();
}

// NFT через бота
function sendNFT() {
  tg.sendData("deposit_gift");
  closeModal();
}

// вкладки
function openTab(tab, el) {
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  const content = document.getElementById("content");

  if (tab === "market") content.innerHTML = "🛒 Маркет";
  if (tab === "games") content.innerHTML = "🎮 Игры";
  if (tab === "gifts") content.innerHTML = "🎁 NFT";
}

// игра
function playArena() {
  alert("🚀 Скоро!");
}
</script>

</body>
</html>
