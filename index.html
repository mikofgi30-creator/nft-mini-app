<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Market</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.img {
  width: 100%;
  height: 120px;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
}

.price {
  margin-top: 10px;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.balance {
  margin: 10px;
  font-size: 18px;
}
</style>

</head>
<body>

<h1>🖼 NFT Market</h1>
<div class="balance">💰 Баланс: <span id="balance">5</span> TON</div>

<div class="grid">

  <div class="card">
    <div class="img" style="background-image:url('https://picsum.photos/200?1')"></div>
    <h3>NFT #1</h3>
    <div class="price">1 TON</div>
    <button onclick="buy(1)">Купить</button>
  </div>

  <div class="card">
    <div class="img" style="background-image:url('https://picsum.photos/200?2')"></div>
    <h3>NFT #2</h3>
    <div class="price">2 TON</div>
    <button onclick="buy(2)">Купить</button>
  </div>

  <div class="card">
    <div class="img" style="background-image:url('https://picsum.photos/200?3')"></div>
    <h3>NFT #3</h3>
    <div class="price">3 TON</div>
    <button onclick="buy(3)">Купить</button>
  </div>

  <div class="card">
    <div class="img" style="background-image:url('https://picsum.photos/200?4')"></div>
    <h3>NFT #4</h3>
    <div class="price">4 TON</div>
    <button onclick="buy(4)">Купить</button>
  </div>

</div>

<script>
let balance = 5;

function buy(price) {
  if (balance >= price) {
    balance -= price;
    document.getElementById("balance").innerText = balance;
    alert("🎉 NFT куплен!");
  } else {
    alert("❌ Недостаточно TON");
  }
}
</script>

</body>
</html>
