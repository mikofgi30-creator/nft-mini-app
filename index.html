<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.card {
  background: #1e293b;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
}
</style>
</head>

<body>

<h1>🖼 NFT Market</h1>
<p id="user"></p>

<div class="card">
  NFT #1 — 1 TON  
  <br><br>
  <button onclick="buy()">Купить</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;

if (user) {
  document.getElementById("user").innerText =
    "👤 " + user.first_name;
}

async function buy() {
  const res = await fetch("http://localhost:8000/buy", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      user_id: user.id,
      nft: "NFT #1"
    })
  });

  const data = await res.json();
  alert(data.message);
}
</script>

</body>
</html>
