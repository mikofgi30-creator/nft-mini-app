<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 TOP -->
<div class="topbar">
  <img id="avatar" class="avatar">
  <div id="username">User</div>
</div>

<!-- 💎 WALLET -->
<div class="wallet">
  <div>Balance</div>
  <h1 id="balance">0 TON</h1>

  <div class="row">
    <div class="btn" onclick="openDeposit()">Deposit</div>
    <div class="btn">Withdraw</div>
  </div>
</div>

<!-- 📦 CONTENT -->
<div id="content" class="content"></div>

<!-- 🔻 NAV -->
<div class="nav">
  <div class="nav-btn active" onclick="openTab('market', this)">🏪</div>
  <div class="nav-btn" onclick="openTab('profile', this)">👤</div>
</div>

<script src="app.js"></script>
</body>
</html>
