<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #000, #111);
  color: white;
  font-family: Arial;
}

/* 🔝 TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.wallet-box {
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
}

/* кнопки */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.action-btn {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.2);
}

/* контент */
.content {
  padding: 15px;
}

/* NFT карточка */
.nft {
  background: #111;
  padding: 10px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.nft img {
  width: 100%;
  border-radius: 10px;
}

/* нижний бар */
.nav {
  position: fixed;
  bottom: 20px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 30px;
}

.btn {
  color: #888;
  text-align: center;
  font-size: 12px;
}

.btn.active {
  color: white;
}

/* модалка */
.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  padding: 20px;
  display: none;
  border-radius: 20px 20px 0 0;
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="topbar">
  <img id="avatar" class="avatar">
  <div id="username">User</div>
</div>

<!-- 💎 WALLET -->
<div class="wallet-box">
  <div>Wallet not connected</div>
  <h1 id="balance">0 TON</h1>

  <div class="actions">
    <div class="action-btn" onclick="openDeposit()">Deposit</div>
    <div class="action-btn">Withdraw</div>
  </div>
</div>

<!-- 📦 КОНТЕНТ -->
<div id="content" class="content"></div>

<!-- 🔻 NAV -->
<div class="nav">
  <div class="btn active" onclick="openTab('market', this)">🏪</div>
  <div class="btn" onclick="openTab('profile', this)">👤</div>
</div>

<!-- 💰 MODAL -->
<div id="modal" class="modal">
  <h3>Пополнение</h3>

  <div onclick="payTON()" class="action-btn">
    💎 Пополнить TON
  </div>

  <div onclick="sendNFT()" class="action-btn" style="margin-top:10px;">
    🎁 NFT подарок
  </div>

  <div onclick="closeModal()" style="margin-top:10px;text-align:center;color:#888;">
    Закрыть
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = null;

// 👤 USER
const user = tg.initDataUnsafe.user;

if (user) {
  userId = user.id;
  document.getElementById("username").innerText = user.first_name;
  document.getElementById("avatar").src =
    user.photo_url || "https://i.pravatar.cc/100";
}

// ⚡ API (вставь свой Railway)
const API = "https://ТВОЙ-RAILWAY-URL.up.railway.app";

// 💎 баланс
async function loadBalance() {
  if (!userId) return;

  try {
    const res = await fetch(API + "/profile?user_id=" + userId);
    const data = await res.json();
    document.getElementById("balance").innerText = data.balance + " TON";
  } catch {}
}

setInterval(loadBalance, 5000);
loadBalance();

// 📂 вкладки
function openTab(tab, el) {
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  const content = document.getElementById("content");

  if (tab === "market") {
    content.innerHTML = `
      <div class="nft">
        <img src="https://picsum.photos/200?1">
        <div>Rare NFT</div>
        <div>0.2 TON</div>
      </div>

      <div class="nft">
        <img src="https://picsum.photos/200?2">
        <div>Epic NFT</div>
        <div>0.5 TON</div>
      </div>
    `;
  }

  if (tab === "profile") {
    content.innerHTML = `
      <div class="wallet-box">
        <h2>Balance</h2>
        <h1 id="profileBalance">${document.getElementById("balance").innerText}</h1>

        <div class="actions">
          <div class="action-btn" onclick="openDeposit()">Deposit</div>
          <div class="action-btn">Withdraw</div>
        </div>
      </div>
    `;
  }
}

// 💰 модалка
function openDeposit() {
  document.getElementById("modal").style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// 💎 TON
function payTON() {
  const wallet = "ТВОЙ_TON_КОШЕЛЕК";
  const amount = 0.1;

  const url = `https://app.tonkeeper.com/transfer/${wallet}?amount=${amount * 1e9}&text=user_${userId}`;

  window.open(url, "_blank");
  closeModal();
}

// 🎁 NFT
function sendNFT() {
  tg.sendData("deposit_gift");
  closeModal();
}

// старт
openTab("market", document.querySelector(".btn"));
</script>

</body>
</html>
