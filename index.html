<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 15px 25px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4f46e5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 NFT Bot</h1>
    <p>Добро пожаловать в мини-приложение</p>

    <div class="card">
      <h2>💎 NFT Balance</h2>
      <p id="balance">0 NFT</p>
    </div>

    <button onclick="addNFT()">Получить NFT</button>
  </div>

  <script>
    let balance = 0;

    function addNFT() {
      balance++;
      document.getElementById("balance").innerText = balance + " NFT";
    }
  </script>
</body>
</html>
