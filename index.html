<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #000, #111);
  color: white;
  font-family: Arial;
}

/* заголовок */
.header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* контент */
.content {
  padding: 20px;
  font-size: 16px;
}

/* кнопка */
.play-btn {
  margin: 20px;
  padding: 16px;
  border-radius: 20px;
  text-align: center;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  font-weight: bold;
}

/* стеклянный бар */
.nav {
  position: fixed;
  bottom: 20px;
  left: 16px;
  right: 16px;

  display: flex;
  justify-content: space-around;

  padding: 12px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);

  border-radius: 30px;
}

/* кнопки */
.btn {
  color: #888;
  text-align: center;
  font-size: 12px;
  cursor: pointer;
}

.btn span {
  font-size: 22px;
  display: block;
}

.btn.active {
  color: white;
}
</style>
</head>

<body>

<div class="header">Arena Tournament</div>

<div class="play-btn" onclick="playArena()">
  ▶ Play Arena
</div>

<div id="content" class="content">
  🛒 Здесь будет маркет
</div>

<div class="nav">
  <div class="btn active" onclick="openTab('market', this)">
    <span>🏪</span>
    Market
  </div>

  <div class="btn" onclick="openTab('games', this)">
    <span>🎮</span>
    Games
  </div>

  <div class="btn" onclick="openTab('gifts', this)">
    <span>🎁</span>
    Gifts
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// переключение вкладок
function openTab(tab, el) {
  // убрать active у всех
  document.querySelectorAll(".btn").forEach(btn => {
    btn.classList.remove("active");
  });

  // добавить active
  el.classList.add("active");

  // смена контента
  const content = document.getElementById("content");

  if (tab === "market") {
    content.innerHTML = "🛒 Здесь будет маркет";
  }

  if (tab === "games") {
    content.innerHTML = "🎮 Здесь будут игры";
  }

  if (tab === "gifts") {
    content.innerHTML = "🎁 Здесь будут NFT";
  }
}

// кнопка Play
function playArena() {
  alert("🚀 Игра скоро будет!");
}
</script>

</body>
</html>
